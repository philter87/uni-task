app = "uni-task"
primary_region = "ams"

[build]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ConnectionStrings__DefaultConnection = "Data Source=/data/tasks.db"
  FrontendUrl = "https://uni-task.fly.dev"
  AllowedOrigins__0 = "https://uni-task.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "unitask_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
